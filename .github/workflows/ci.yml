name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run unit tests
        run: make test
      - name: Coverage
        run: make coverage

  test-scenarios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run scenario tests
        run: make test-scenarios

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -tags "no_duckdb,no_sqlite" -ldflags "-s -w -X github.com/florinutz/pgcdc/cmd.Version=${{ github.sha }}" -o pgcdc-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/pgcdc
      - uses: actions/upload-artifact@v4
        with:
          name: pgcdc-${{ matrix.goos }}-${{ matrix.goarch }}
          path: pgcdc-${{ matrix.goos }}-${{ matrix.goarch }}

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t pgcdc:ci .

  build-slim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build slim binary
        run: go build -tags "no_kafka,no_grpc,no_iceberg,no_nats,no_redis,no_plugins,no_kafkaserver,no_views,no_s3,no_graphql,no_arrow,no_duckdb,no_sqlite" -o /dev/null ./cmd/pgcdc
